  <main id="main">
    <section class="section" aria-labelledby="page-title">
      <div class="wrap grid">
        <div class="col-meta">
          <span class="section-num">Recent</span>
          <h1 id="page-title" class="section-title">Activities</h1>
        </div>
        <div class="col-main">
          <p class="prose">
            Conferences, gatherings, lab moments, and quiet days &mdash;
            posted as they happen.
          </p>
          <ol class="activity-list" id="activity-list" aria-live="polite">
            <li class="activity-empty">Loading entries &hellip;</li>

        </div>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2026 Zhuoheng Li</p>
      <p><a href="#top">Back to top &uarr;</a></p>
    </div>
  </footer>

  <script>
    (function () {
      const list = document.getElementById('activity-list');

      const escape = s => String(s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));

      const formatDate = iso => {
        const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
        return m ? `${m[1]}.${m[2]}.${m[3]}` : escape(iso);
      };

      const postToHtml = p => {
        const desc = p.description
          ? `<p class="activity-desc">${escape(p.description).replace(/\n/g, '<br>')}</p>`
          : '';
        const images = (Array.isArray(p.images) && p.images.length)
          ? `<div class="activity-images">${p.images.map(src =>
              `<a href="${escape(src)}" target="_blank" rel="noopener">
                 <img src="${escape(src)}" alt="${escape(p.title || 'Activity photo')}" loading="lazy">
               </a>`
            ).join('')}</div>`
          : '';
        const title = p.title ? `<h3 class="activity-title">${escape(p.title)}</h3>` : '';
        return `
          <li class="activity-item">
            <span class="activity-date">${formatDate(p.date)}</span>
            <div class="activity-body">
              ${title}
              ${desc}
              ${images}
            </div>
          </li>
        `;
      };

      fetch('posts.json', { cache: 'no-cache' })
        .then(r => {
          if (!r.ok) throw new Error('posts.json ' + r.status);
          return r.json();
        })
        .then(posts => {
          if (!Array.isArray(posts) || posts.length === 0) {
            list.innerHTML = '<li class="activity-empty">No entries yet. Add one to <code>posts.json</code>.</li>';
            return;
          }
          posts.sort((a, b) => String(b.date).localeCompare(String(a.date)));
          list.innerHTML = posts.map(postToHtml).join('');
        })
        .catch(err => {
          list.innerHTML = `<li class="activity-empty">Could not load entries (${escape(err.message)}).</li>`;
        });
    })();
  </script>
</body>
</html>
